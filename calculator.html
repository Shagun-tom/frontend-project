<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="calculator.css">
</head>

<body>
    <div class="calculator">
        <div id="output"></div>
        <div id="input">
            <button class="opr" id="ac">AC</button>
            <button class="opr" id="mod">%</button>
            <button class="opr" id="del">⇐</button>
            <button class="opr" id="div">÷</button>
            <button class="num" id="seven">7</button>
            <button class="num" id="eight">8</button>
            <button class="num" id="nine">9</button>
            <button class="opr" id="mul">×</button>
            <button class="num" id="four">4</button>
            <button class="num" id="five">5</button>
            <button class="num" id="six">6</button>
            <button class="opr" id="sub">-</button>
            <button class="num" id="one">1</button>
            <button class="num" id="two">2</button>
            <button class="num" id="three">3</button>
            <button class="opr" id="plus">+</button>
            <button class="num" id="dblzero">00</button>
            <button class="num" id="zero">0</button>
            <button class="num" id="point">.</button>
            <button class="opr" id="result">=</button>
      
        </div>
    </div>
    <script src="calculator.js"></script>
</body>

</html>
