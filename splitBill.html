<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="splitBill.css">
</head>

<body>
    <div class="container">
        <!-- <center>
            <h1 id="name">Split Bill</h1>
        </center> -->
        <h1 id="name">Split Bill</h1>
        <div id="bill">
            <label for="billAmount" id="billLabel" class="splitLable" value="billAmount">Bill Amount(₹) : </label>
            <input type="number" id="billAmount" class="inputDetails">
        </div>
        <div id="tip">
            <label for="tipPercentage" id="tipLabel" value="tipPercentage" class="splitLable">Tip Percentage(%) :
            </label>
            <input type="text" id="tipPercentage" class="inputDetails" placeholder="e.g. 100">
        </div>
        <div id="people">
            <label for="numOfPeople" id="peopleLabel" value="numOfPeople" class="splitLable">Number of people :</label>
            <input type="text" id="numOfPeople" class="inputDetails" placeholder="Enter number of people">
        </div>

        <center>
            <button id="calculate">Calculate</button>

        </center>

        <center>
            <p id="result"></p>
        </center>
    </div>
    <script src="splitBill.js"></script>
</body>

</html>
